<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <meta name="description" content="Personal Dashboard">
    <meta name="theme-color" content="#050508">
    <meta property="og:title" content="Dashboard">
    <meta property="og:description" content="Personal Dashboard">
    <meta property="og:type" content="website">
    <meta property="og:url" content="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="noise-overlay"></div>
    <div class="cursor-glow" id="cursorGlow"></div>

    <button class="music-toggle" id="musicToggle" title="Toggle Music" style="display:none;">
        <svg id="musicOff" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
            <line x1="1" y1="1" x2="23" y2="23" stroke-width="2"/>
        </svg>
        <svg id="musicOn" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" style="display:none;">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
    </button>
    <audio id="bgMusic" loop preload="auto">
        <source src="assets/music.mp3" type="audio/mpeg">
    </audio>

    <div class="container">

        <div class="profile-section fade-in">
            <div class="avatar-wrapper">
                <div class="avatar-ring">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <img src="" alt="Avatar" class="avatar" id="avatar">
                </div>
            </div>
            <h1 class="username" id="displayUsername"></h1>
            <p class="realname" id="displayRealName"></p>
            <div class="status-text" id="statusText">
                <span class="status-emoji" id="statusEmoji"></span>
                <span id="statusMessage">Loading...</span>
            </div>
        </div>

        <div class="bio-section fade-in">
            <p class="bio-text" id="displayBio"></p>
        </div>

        <div class="discord-activity fade-in" id="activityCard" style="display: none;">
            <div class="activity-header">
                <div class="activity-type" id="activityType">PLAYING</div>
            </div>
            <div class="activity-content">
                <img class="activity-image" id="activityImage" src="" alt="">
                <div class="activity-info">
                    <div class="activity-name" id="activityName"></div>
                    <div class="activity-details" id="activityDetails"></div>
                    <div class="activity-state" id="activityState"></div>
                </div>
            </div>
        </div>

        <div class="spotify-card fade-in" id="spotifyCard" style="display: none;">
            <div class="spotify-header">
                <svg class="spotify-icon" viewBox="0 0 24 24" width="16" height="16">
                    <path fill="#1DB954" d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
                </svg>
                <span>LISTENING TO SPOTIFY</span>
            </div>
            <div class="spotify-content">
                <img class="spotify-album" id="spotifyAlbum" src="" alt="Album Art">
                <div class="spotify-info">
                    <div class="spotify-song" id="spotifySong"></div>
                    <div class="spotify-artist" id="spotifyArtist"></div>
                    <div class="spotify-album-name" id="spotifyAlbumName"></div>
                </div>
            </div>
            <div class="spotify-progress">
                <div class="spotify-bar">
                    <div class="spotify-bar-fill" id="spotifyBar"></div>
                </div>
                <div class="spotify-times">
                    <span id="spotifyElapsed">0:00</span>
                    <span id="spotifyTotal">0:00</span>
                </div>
            </div>
        </div>

        <div class="section-label fade-in">CONNECT</div>
        <div class="social-links fade-in" id="socialLinks"></div>

        <div class="section-label fade-in">TECH STACK</div>
        <div class="tech-stack fade-in" id="techStack"></div>

        <div class="section-label fade-in">PROJECTS</div>
        <div class="projects-grid fade-in" id="projectsGrid">
            <div class="project-skeleton"></div>
            <div class="project-skeleton"></div>
            <div class="project-skeleton"></div>
        </div>

        <div class="footer fade-in">
            <p id="footerText"></p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/particles.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
